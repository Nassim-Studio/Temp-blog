{{ define "main" }}
<div class="space-y-12">
  <section class="text-center py-16">
    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">{{ .Title }}</h1>
    <p class="text-lg text-gray-600 max-w-2xl mx-auto">{{ .Content }}</p>
  </section>

  <section>
    <div class="flex items-center justify-between mb-8">
      <h2 class="text-2xl font-bold">Recent Posts</h2>
      <a href="{{ "/posts/" | relLangURL }}" class="text-accent hover:underline font-medium">View all &rarr;</a>
    </div>
    
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3">
      {{ range first 3 (where site.RegularPages "Type" "posts") }}
        <article class="flex flex-col space-y-3 bg-white border border-border p-5 rounded-xl hover:shadow-lg transition-shadow">
          <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" class="text-sm text-gray-500">
            {{ .Date.Format "January 2, 2006" }}
          </time>
          <h3 class="text-xl font-bold leading-tight">
            <a href="{{ .RelPermalink }}" class="hover:text-accent transition-colors">{{ .Title }}</a>
          </h3>
          <p class="text-gray-600 line-clamp-3">{{ .Summary }}</p>
        </article>
      {{ end }}
    </div>
  </section>
</div>
{{ end }}
