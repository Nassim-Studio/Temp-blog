{{ define "main" }}
<div class="max-w-3xl mx-auto pt-8">
  <header class="mb-12">
    <h1 class="text-4xl font-extrabold tracking-tight mb-2">{{ .Title }}</h1>
    {{ with .Content }}
      <div class="text-lg text-gray-600 prose">{{ . }}</div>
    {{ end }}
  </header>

  <div class="space-y-12">
    {{ $paginator := .Paginate .Data.Pages }}
    {{ range $paginator.Pages }}
      <article class="flex flex-col space-y-2 border-b border-border pb-8 last:border-0">
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" class="text-sm text-gray-500 font-medium">
          {{ .Date.Format "January 2, 2006" }}
        </time>
        <h2 class="text-2xl font-bold leading-tight">
          <a href="{{ .RelPermalink }}" class="hover:text-accent transition-colors">{{ .Title }}</a>
        </h2>
        <p class="text-gray-600 mt-2">{{ .Summary }}</p>
        <a href="{{ .RelPermalink }}" class="text-accent hover:underline font-medium text-sm mt-4 uppercase tracking-wider">Read Full Post &rarr;</a>
      </article>
    {{ end }}
  </div>

  {{ partial "pagination.html" . }}
</div>
{{ end }}
